name: CI - Calculadora FATEC

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install ruff

      - name: Rodar lint
        run: ruff check .

  test:
    name: Testes
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar ferramentas de teste
        run: pip install pytest pytest-cov

      - name: Rodar testes com cobertura
        run: pytest --cov=. --cov-report=xml -v

      - name: Salvar artefato de cobertura
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: test  # só roda se os testes passarem

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Baixar artefato de cobertura
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml